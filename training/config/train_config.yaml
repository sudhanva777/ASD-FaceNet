experiment_name: "asd_facenet_v2_antioverfit"
seed: 42

data:
  image_size: 224
  num_folds: 5
  batch_size: 16       # was 32 — smaller batch + more augmentation diversity
  num_workers: 0       # CPU training on Windows
  manifest_path: "data/manifest.csv"
  processed_dir: "data/processed"
  raw_dir: "data/raw"

model:
  architecture: "efficientnet_b0"
  pretrained: true
  num_classes: 2
  drop_rate: 0.4       # was 0.3
  drop_path_rate: 0.2  # NEW — stochastic depth regularization

training:
  linear_probe_epochs: 5   # was 8
  linear_probe_lr: 1.0e-3
  finetune_epochs: 40
  finetune_lr: 3.0e-4      # was 1e-4 — higher LR, differential per layer group
  weight_decay: 0.05        # was 0.01
  label_smoothing: 0.1
  early_stop_patience: 8
  mixed_precision: true     # ignored on CPU
  device: "auto"            # "auto" = cuda if available, else cpu
  use_mixup: true           # NEW
  mixup_alpha: 0.2          # NEW
  grad_clip: 1.0            # NEW
  warmup_epochs: 3          # NEW

output:
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"
  best_model_name: "efficientnet_b0_asd"

# Legacy augmentation values kept for reference; actual pipeline is in dataset.py
augmentation:
  horizontal_flip: 0.5
  rotation_limit: 20
  brightness_limit: 0.3
  contrast_limit: 0.3
  gauss_noise_var: [10, 50]
  clahe_clip_limit: 3.0
  coarse_dropout_holes: 4
